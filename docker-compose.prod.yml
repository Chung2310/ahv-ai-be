version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ahv-ai-core:production
    container_name: ahv-ai-core-prod
    restart: unless-stopped
    ports:
      - "${PORT:-5005}:${PORT:-5005}"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
    depends_on:
      - mongodb
      - redis
    networks:
      - prod_network

  redis:
    image: redis:7-alpine
    container_name: ahv-ai-redis-prod
    restart: unless-stopped
    volumes:
      - redis_prod_data:/data
    networks:
      - prod_network

  mongodb:
    image: mongo:latest
    container_name: ahv-ai-mongodb-prod
    restart: unless-stopped
    volumes:
      - mongodb_prod_data:/data/db
    networks:
      - prod_network

networks:
  prod_network:
    driver: bridge

volumes:
  mongodb_prod_data:
  redis_prod_data:
